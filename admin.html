<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jess Bakes Sourdough | Admin Dashboard</title>

    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <!-- LOGIN SCREEN -->

    <div id="loginScreen" class="login-screen">

        <div class="login-card">

            <p class="eyebrow">Jess Bakes Sourdough</p>

            <h1>Admin Dashboard</h1>

            <p class="login-subtitle">

                Sign in to manage your website.

            </p>

            <form id="loginForm">

                <div class="form-group">

                    <label for="email">Email</label>

                    <input
                        type="email"
                        id="email"
                        required>

                </div>

                <div class="form-group">

                    <label for="password">Password</label>

                    <input
                        type="password"
                        id="password"
                        required>

                </div>

                <button
                    type="submit"
                    class="login-btn">

                    Sign In

                </button>

            </form>

            <p id="loginError"></p>

        </div>

    </div>

    <!-- DASHBOARD -->

    <div id="dashboard" style="display:none;"></div>

    <div id="editOptionModal" class="modal" style="display:none;">

    <div class="modal-card">

        <h2 id="optionModalTitle">Edit Ballot Option</h2>

        <input type="hidden" id="editOptionId">

        <div class="form-group">

            <label>Name</label>

            <input
                type="text"
                id="editOptionName">

        </div>

        <div class="form-group">

            <label>Category</label>

            <select id="editOptionCategory">

                <option value="Bread">Bread</option>

                <option value="Cookie">Cookie</option>

                <option value="Dessert">Dessert</option>

            </select>

        </div>

        <div class="form-group">

            <label>

                <input
                    type="checkbox"
                    id="editOptionActive">

                Active

            </label>

        </div>

        <div class="modal-buttons">

            <button
                class="delete-btn"
                onclick="closeEditModal()">

                Cancel

            </button>

            <button
                class="approve-btn"
                onclick="saveBallotOption()">

                Save Changes

            </button>

        </div>

    </div>

</div>

    <!-- SCRIPTS -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>

    <script src="js/admin.js"></script>

</body>

</html>
