<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Orders | Jess Bakes Sourdough</title>

    <link rel="stylesheet"
          href="../css/admin.css">

</head>

<body>

<div class="admin-shell">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-brand">

            <h2>Jess Bakes</h2>

            <span>SOURDOUGH</span>

        </div>

        <nav class="sidebar-nav">

            <a href="dashboard.html">
                Dashboard
            </a>

            <a href="orders.html"
               class="active">
                Orders
            </a>

            <a href="menu.html">
                Menu
            </a>

            <a href="suggestions.html">Suggestions</a>

            <a href="reviews.html">
                Reviews
            </a>

            <hr>

            <a href="production.html">
    Production
</a>

            <a href="sales.html">
                Sales
            </a>

            <a href="analytics.html">
                Analytics
            </a>

            <a href="inventory.html">
                Inventory
            </a>

            <a href="packaging.html">
                Packaging
            </a>

            <a href="gallery.html">
                Gallery
            </a>

            <hr>

            <a href="settings.html">
                Settings
            </a>

        </nav>

        <button
            id="logoutBtn"
            class="logout-btn">

            Sign Out

        </button>

    </aside>

    <!-- Main -->

    <main class="admin-content">

        <header class="admin-header">

            <div>

                <h1>

                    Orders

                </h1>

                <p>

                    Manage customer orders.

                </p>

            </div>

        </header>

        <!-- NEW ORDER BUTTON -->

        <div class="button-row"
             style="margin-bottom:24px;">

            <button
                class="primary-btn"
                onclick="openManualOrderModal()">

                + New Order

            </button>

        </div>

        <section class="orders-page">

            <section class="overview-grid">

                <article class="overview-card">

                    <span class="overview-label">

                        Pending

                    </span>

                    <h2 id="pendingCount">

                        --

                    </h2>

                </article>

                <article class="overview-card">

                    <span class="overview-label">

                        Confirmed

                    </span>

                    <h2 id="confirmedCount">

                        --

                    </h2>

                </article>

                <article class="overview-card">

                    <span class="overview-label">

                        Ready

                    </span>

                    <h2 id="readyCount">

                        --

                    </h2>

                </article>

                <article class="overview-card">

                    <span class="overview-label">

                        Completed

                    </span>

                    <h2 id="completedCount">

                        --

                    </h2>

                </article>

            </section>

            <section class="dashboard-card">

                <div class="dashboard-card-header">

                    <h2>

                        All Orders

                    </h2>

                </div>

                <div id="orderManager">

                    Loading...

                </div>

            </section>

        </section>

    </main>

</div>

<!-- ==========================================
     MANUAL ORDER MODAL
========================================== -->

<div
id="manualOrderModal"
class="modal-overlay"
style="display:none;">

<div class="modal-card large-modal">

<div class="modal-header">

<h2>

New Order

</h2>

<button
class="modal-close"
onclick="closeManualOrderModal()">

✕

</button>

</div>

<div class="modal-body">

    <input
    type="hidden"
    id="editingOrderId">

<label>

Customer Name

</label>

<input
id="manualCustomerName"
type="text">

<label>

Phone

</label>

<input
id="manualCustomerPhone"
type="text">

<label>

Email (optional)

</label>

<input
id="manualCustomerEmail"
type="email">

<label>

Preferred Contact

</label>

<select id="manualContact">

<option value="text">

Text Message

</option>

<option value="email">

Email

</option>

</select>

<label>

Order Source

</label>

<select id="manualSource">

<option value="website">

Website

</option>

<option value="facebook">

Facebook

</option>

<option value="messenger">

Messenger

</option>

<option value="instagram">

Instagram

</option>

<option value="phone">

Phone

</option>

<option value="text">

Text Message

</option>

<option value="in_person">

In Person

</option>

<option value="other">

Other

</option>

</select>

<label>

Order Type

</label>

<select
id="manualOrderType"
onchange="toggleManualOrderType()">

<option value="weekly">

Weekly Sunday Pickup

</option>

<option value="custom">

Custom Order

</option>

</select>

<div id="weeklyFields">

<label>

Pickup Date

</label>

<input
id="manualPickupDate"
type="date">

</div>

<div
id="customFields"
style="display:none;">

<label>

Event Date

</label>

<input
id="manualEventDate"
type="date">

<label>

Pickup Date

</label>

<input
id="manualCustomPickupDate"
type="date">

</div>

<label>

Notes

</label>

<textarea
id="manualNotes"
rows="4"
placeholder="Anything about this order..."></textarea>

<hr>

<h3>

Items

</h3>

<div id="manualItems">

</div>

<button
type="button"
class="secondary-btn"
onclick="addManualItem()">

+ Add Item

</button>

</div>

<div class="modal-footer">

<button
class="secondary-btn"
onclick="closeManualOrderModal()">

Cancel

</button>

<button
class="primary-btn"
onclick="saveManualOrder()">

Save Order

</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script src="../js/auth.js"></script>

<script src="../js/admin-orders.js"></script>

</body>

</html>
