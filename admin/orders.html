                <h1>

            <h2 id="pendingCount">

            </h2>

            <span class="overview-label">

            </h2>

        </article>

        <article class="overview-card">

            <span class="overview-label">

            </span>

            <h2 id="readyCount">

                --

            </h2>

        </article>

        <article class="overview-card">

            <span class="overview-label">

                Completed

            </span>

            <h2 id="completedCount">

                --

            </h2>

        </article>

    </section>

    <section class="dashboard-card">

        <div class="dashboard-card-header">

            <h2>

                All Orders

            </h2>

        </div>

        <div id="orderManager">

            Loading...

</section>
